---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # ingress rule 의 이름은 유일해야 한다 (복사 붙여 넣기 했으면 이름 변경)
  name: ingress-rule-jenkins
  # 연결할 service 가 속해 있는 namespace 에 배포가 되어야 한다.
  namespace: jenkins
spec:
  # 배포한 ingress-controller 와 연결고리가 되는 ingressClassName: nginx
  ingressClassName: nginx
  rules:
  - host: jenkins.cloud-learning.site
    http:
      paths:
      - path: /
        pathType: Prefix
        backend: 
          service:
            name: my-jenkins #  라는 namespace 에 존재하는 service 이다 
            port:
              number: 8080 # jenkins 는 기본 8080 port