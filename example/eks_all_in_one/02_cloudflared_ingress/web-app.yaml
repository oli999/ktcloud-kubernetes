apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-web
  template:
    metadata:
      labels:
        app: my-web
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  # 이름은 테라폼의 Cloudflare Tunnel 설정(내부 DNS)과 맞추기 위해 그대로 유지합니다.
  name: nginx-svc
spec:
  # 1. type을 NodePort에서 ClusterIP로 변경합니다. (또는 이 줄을 삭제해도 기본값이 ClusterIP입니다.)
  type: ClusterIP
  selector:
    app: my-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      