# step08_gitea/gitea-values.yaml 파일

# [네트워크 설정] MetalLB 로드밸런서를 통한 외부 서비스 노출
service:
  http:
    type: LoadBalancer
    port: 80
    loadBalancerIP: "172.16.8.42"
    annotations:
      # HTTP와 SSH 서비스가 동일한 고정 IP(172.16.8.42)를 나눠 쓰도록 허용하는 설정입니다.
      # 이 주석(Annotation) 값이 서로 같아야만 두 서비스가 충돌 없이 1개의 IP로 묶입니다.
      metallb.universe.tf/allow-shared-ip: "gitea-shared"
  ssh:
    type: LoadBalancer
    port: 22
    loadBalancerIP: "172.16.8.42"
    annotations:
      # 동일한 공유 ID를 지정하여 HTTP(80)와 SSH(22)가 공존할 수 있게 만듭니다.
      metallb.universe.tf/allow-shared-ip: "gitea-shared"

# 깃랩/깃허브 역할을 하는 소스코드 저장소(Gitea) 앱 설정
gitea:
  admin:
    username: "admin"
    password: "admin1234"
  config:
    server:
      # 웹 브라우저 화면에 표시될 기본 도메인과 깃 클론용 SSH 주소를 우리 로드밸런서 IP로 강제 지정!
      DOMAIN: "172.16.8.42"
      SSH_DOMAIN: "172.16.8.42"
    webhook:
      ALLOWED_HOST_LIST: "*"
#  실습 환경을 위해 무겁고 복잡한 고가용성(HA/Cluster) 모드는 모두 차단합니다.
postgresql-ha:
  enabled: false
redis-cluster:
  enabled: false
valkey-cluster:
  enabled: false  

# [실습 최적화] 가볍고 날씬한 단일(Standalone) DB & 캐시만 활성화합니다.
postgresql:
  enabled: true
  persistence:
    enabled: true
    size: "5Gi" # 우리가 만든 nfs-client 스토리지 클래스에서 5기가를 자동으로 떼옵니다.
  volumePermissions:
    # 온프레미스 NFS 실습 시 발생하는 Permission Denied 에러를 원천 차단합니다.
    enabled: true  

valkey:
  enabled: true
  volumePermissions:
    # 캐시 서버(Valkey) 역시 데이터 저장소 권한 문제를 자동으로 해결하도록 켭니다.
    enabled: true