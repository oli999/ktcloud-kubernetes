# templates/ingress-rule.yaml
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # 배포시의 이름을 .ReleaseName 으로 참조 할수 있다.
  name: {{ .Release.Name }}-ingress
spec:
  ingressClassName: aaa
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
        {{- range .Values.ingress.paths }}
        - path: {{ .path }}
          pathType: {{ .pathType }}
          backend:
            service:
              name: {{ .serviceName }}
              port:  {{ .port }}
        {{- end }}
{{- end }}